services:
  backend:
    build:
      context: ./app-backend
    container_name: weather-backend
    ports:
      - "5001:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weatherdb
      BG_REMOVAL_URL: http://bg-removal:8000/remove-bg
      COLOR_EXTRACT_URL: http://color-picker:8002/extract-colors
      UPLOAD_DIR: /app/uploads
    env_file:
      - ./app-backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
      bg-removal:
        condition: service_started
      color-picker:
        condition: service_started
    volumes:
      - ./app-backend:/app
      - /app/node_modules
      - ./app-backend/uploads:/app/uploads
      - ./app-backend/prisma:/app/prisma

  frontend:
    build:
      context: ./app-mobile/my-app
    container_name: weather-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./app-mobile/my-app:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    image: postgres:15
    restart: always
    container_name: weather-db
    environment:
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weatherdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bg-removal:
    build:
      context: ./bg-removal-service
    container_name: bg-removal
    ports:
      - "8000:8000"
    volumes:
      - ./bg-removal-service:/app

  color-picker:
    build:
      context: ./color-extract-service
    container_name: color-picker
    ports:
      - "8002:8002"
    volumes:
      - ./color-extract-service:/app

  worker:
    build:
      context: ./app-backend
    command: sh -lc "npm run build && node dist/src/workers/cluster.js"
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MIN_WORKER_PROCESSES: 1
      MAX_WORKER_PROCESSES: 10
      WORKER_CONCURRENCY_PER_PROCESS: 1
      SCALE_UP_WAITING_THRESHOLD: 3
      SCALE_DOWN_WAITING_THRESHOLD: 0
      SCALER_POLL_MS: 3000
      BG_REMOVAL_URL: http://bg-removal:8000/remove-bg
      COLOR_EXTRACT_URL: http://color-picker:8002/extract-colors
      UPLOAD_DIR: /app/uploads
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weatherdb
      DATABASE_URL: postgresql://weatheruser:weatherpass@db:5432/weatherdb
    env_file:
      - ./app-backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      bg-removal:
        condition: service_started
      color-picker:
        condition: service_started
      db:
        condition: service_started
    volumes:
      - ./app-backend:/app
      - /app/node_modules
      - ./app-backend/uploads:/app/uploads

  redis:
    image: redis:7
    container_name: weather-redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
