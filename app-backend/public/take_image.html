<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Capture/Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.0/dist/preline.min.js"></script>
    <script src="take_image_js.js" defer></script>
    <base target="_self">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Image Processor</h1>
        
        <div class="flex flex-col space-y-4">
            <button id="cameraBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition duration-200">
                Take Photo with Camera
            </button>
            
            <div class="relative">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <label for="fileInput" class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition duration-200 text-center cursor-pointer">
                    Upload Image
                </label>
            </div>
        </div>

        <div class="mt-4">
        <label for="categorySelect" class="block text-sm font-medium text-gray-700 mb-1">Clothing Category</label>
        <select id="categorySelect" class="w-full border-gray-300 rounded-lg p-2">
            <option value="">Select a category</option>
            <option value="top">Top</option>
            <option value="bottom">Bottom</option>
            <option value="shoes">Shoes</option>
            <option value="outerwear">Outerwear</option>
            <option value="accessory">Accessory</option>
        </select>
        </div>
        
        <div id="previewContainer" class="mt-6 hidden">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Preview</h2>
            <div class="border border-gray-300 rounded-lg p-2">
                <img id="imagePreview" class="max-w-full h-auto rounded" src="" alt="Preview">
            </div>
            <div class="mt-4">
                <button id="processBtn" class="bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-4 rounded-lg transition duration-200 w-full">
                    Process Image
                </button>
            </div>
        </div>
        
        <div id="resultContainer" class="mt-6 hidden">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Image Byte</h2>
            <div class="bg-gray-100 p-3 rounded-lg overflow-auto max-h-40">
                <pre id="byteOutput" class="text-xs text-gray-800"></pre>
            </div>
            <p class="text-sm text-gray-500 mt-2">The image has been converted to bytes.</p>
        </div>
    </div>
</body>
</html>
